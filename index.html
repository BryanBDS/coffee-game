<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Coffee Empire</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="overlay" id="loginScreen">
        <div class="login-card">
            <div class="header-icon">🚜</div>
            <h2>¡Bienvenido, Granjero!</h2>
            <p>Crea tu cuenta para empezar a sembrar</p>
            
            <form id="registerForm">
                <div class="input-box">
                    <input type="text" required placeholder="Nombre de tu granja">
                </div>
                <div class="input-box">
                    <input type="email" required placeholder="Correo electrónico">
                </div>
                <div class="input-box">
                    <input type="password" required placeholder="Contraseña">
                </div>
                
                <button type="submit" class="btn-main">EMPEZAR A JUGAR</button>
            </form>

            <div class="divider"><span>O entra con</span></div>

            <div class="social-login">
                <button class="social-btn google">G</button>
                <button class="social-btn apple">A</button>
            </div>
        </div>
    </div>

<div id="gameUI" style="display:none;">

<div id="playerInfo">
<h2 id="farmName">🌱 Mi granja</h2>
<p id="playerMoney">💰 Balance: 0 CoffeeCoins</p>
</div>       

<h1>☕ Coffee Empire</h1>

<div id="menu">

<button onclick="mostrarMapa()">🌍 Mapa cafetero</button>
<button onclick="mostrarFinca()">🌱 Mi finca</button>
<button onclick="mostrarMercado()">💰 Mercado</button>

</div>

<div id="pantalla"></div>
        
</div>
        
<script src="app.js"></script>

</body>

</html>
